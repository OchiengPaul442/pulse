name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run compile

      - name: Validate webview JS
        run: node scripts/validate-webview-js.mjs

      - name: Test
        run: npx vitest run

      - name: Package VSIX
        run: npx vsce package --no-dependencies -o pulse-agent.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-agent-vsix
          path: pulse-agent.vsix
          retention-days: 30
